language: Español
locale: es

quotes:
  primary: ["«", "»"]
  secondary: ["“", "”"]

apostrophe: "’"

dashes:
  # Em-dash for parenthetical thoughts
  - pattern: " --? "
    replacement: "[NBSP]— "
  # Ranges (en-dash)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [a, e, o, u, y, A, E, O, U, Y]

numbers:
  thousands_sep: "."
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
