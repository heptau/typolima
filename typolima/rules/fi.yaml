language: Suomi
locale: fi

quotes:
  # Finnish uses right-pointing quotes for both open and close
  primary: ["”", "”"]
  secondary: ["’", "’"]

apostrophe: "’"

dashes:
  # Finnish prefers en-dash with spaces or no spaces for thoughts,
  # but with spaces is safer for conservative fixing.
  - pattern: " --? "
    replacement: "[NBSP]– "
  # Ranges
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [ja, i]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
