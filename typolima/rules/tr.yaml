language: Türkçe
locale: tr

quotes:
  primary: ["“", "”"]
  secondary: ["‘", "’"]

apostrophe: "’"

dashes:
  # Turkish often uses em-dash for thoughts
  - pattern: " --? "
    replacement: "[NBSP]— "
  # Ranges
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [ve, de, da, ki]

numbers:
  thousands_sep: "."
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
