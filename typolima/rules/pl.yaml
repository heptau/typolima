language: Polski
locale: pl

quotes:
  primary: ["„", "”"]
  secondary: ["«", "»"]

apostrophe: "’"

dashes:
  # En-dash with non-breaking space before (parenthetical thoughts)
  - pattern: " --? "
    replacement: "[NBSP]– "
  # En-dash for ranges (between digits, no spaces)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [w, z, o, u, a, i, W, Z, O, U, A, I]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
