language: English (US)
locale: en-US

quotes:
  primary: ["“", "”"]
  secondary: ["‘", "’"]

apostrophe: "’"

dashes:
  # US em-dash style: no spaces around
  - pattern: " ---? "
    replacement: "[NBSP]— "
  - pattern: " -- "
    replacement: "—"
  # Ranges (en-dash)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [a, an, the, in, on, at, by, of, for, with]

numbers:
  thousands_sep: ","
  decimal_sep: "."
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
