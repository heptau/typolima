language: Català
locale: ca

quotes:
  primary: ["«", "»"]
  secondary: ["“", "”"]

apostrophe: "’"

dashes:
  # Catalan often uses em-dash with spaces for thoughts similar to Spanish
  - pattern: " --? "
    replacement: "[NBSP]— "
  # Ranges
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [a, i, o, u, de, la, el, en]

numbers:
  thousands_sep: "."
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
