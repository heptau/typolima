language: Français
locale: fr

quotes:
  primary: ["«", "»"]
  secondary: ["‹", "›"]

apostrophe: "’"

dashes:
  # Em-dash for parenthetical thoughts or dialogues
  - pattern: " --? "
    replacement: "[NBSP]— "
  # Ranges (en-dash)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [à, y, de, du, le, la, les, des, un, une, et, ou]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: ["?", "!", ":", ";", "%"]
  space_after:  ["«"]

custom_regex: []
