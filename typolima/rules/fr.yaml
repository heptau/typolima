language: Français
locale: fr

quotes:
  primary: ["«", "»"]
  secondary: ["‹", "›"]

non_breaking_prepositions: [à, de, du, le, la, les, des, un, une, et, ou]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: ["?", "!", ":", ";", "%"]
  space_after:  ["«"]
