language: Slovenčina
locale: sk

quotes:
  primary: ["„", "“"]
  secondary: ["‚", "‘"]

apostrophe: "’"

dashes:
  # En-dash with non-breaking space before (parenthetical thoughts)
  - pattern: " --? "
    replacement: "[NBSP]– "
  # En-dash for ranges (between digits, no spaces)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [v, s, z, k, o, u, a, i, V, S, Z, K, O, U, A, I]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex:
  # s. r. o. -> s.[NNBSP]r.[NNBSP]o.
  - pattern: "s\\.\\s?r\\.\\s?o\\."
    replacement: "s.[NNBSP]r.[NNBSP]o."
  - pattern: "a\\.\\s?s\\."
    replacement: "a.[NNBSP]s."
