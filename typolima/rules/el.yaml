language: Ελληνικά
locale: el

quotes:
  primary: ["«", "»"]
  secondary: ["“", "”"]

apostrophe: "’"

dashes:
  - pattern: " --? "
    replacement: "[NBSP]– "
  # Ranges
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [ο, η, το, σ, ή]

numbers:
  thousands_sep: "."
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

# Greek question mark is ; and upper-point separator is ·
custom_regex:
  - pattern: " ;"
    replacement: ";"
  - pattern: " ([·])"
    replacement: "[NBSP]·"
