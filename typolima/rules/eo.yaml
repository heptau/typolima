language: Esperanto
locale: eo

quotes:
  primary: ["«", "»"]
  secondary: ["“", "”"]

apostrophe: "’"

dashes:
  - pattern: " --? "
    replacement: "[NBSP]– "
  # Ranges
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [al, de, en, je, la, na, pri, pro, tra]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
