language: Български
locale: bg

quotes:
  primary: ["„", "“"]
  secondary: ["‘", "’"]

apostrophe: "’"

dashes:
  # Bulgarian uses em-dash with spaces for thoughts
  - pattern: " --? "
    replacement: "[NBSP]— "
  # Ranges
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [в, с, к, у, о, и, а]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
