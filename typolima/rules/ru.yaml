language: Русский
locale: ru

quotes:
  primary: ["«", "»"]
  secondary: ["„", "“"]

apostrophe: "’"

dashes:
  # Russian uses em-dash with spaces for thoughts
  - pattern: " --? "
    replacement: "[NBSP]— "
  # Ranges (em-dash or en-dash, often em-dash)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "—"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [в, с, к, у, о, и, а, В, С, К, У, О, И, А]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
