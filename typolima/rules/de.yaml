language: Deutsch
locale: de

quotes:
  primary: ["„", "“"]
  secondary: ["‚", "‘"]

apostrophe: "’"

dashes:
  # En-dash with non-breaking space before (parenthetical thoughts)
  - pattern: " --? "
    replacement: "[NBSP]– "
  # En-dash for ranges (between digits, no spaces)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [a, d, s, v, b, f, n, u, i, m, z]

numbers:
  thousands_sep: "."
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
