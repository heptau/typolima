language: Tiếng Việt
locale: vi

quotes:
  primary: ["“", "”"]
  secondary: ["‘", "’"]

apostrophe: "’"

dashes:
  - pattern: " --? "
    replacement: "[NBSP]– "
  # Ranges
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [ở, và, là, của, được, trong, cho, đến]

numbers:
  thousands_sep: "."
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
