language: English (UK)
locale: en-GB

quotes:
  # British often prefer single quotes as primary
  primary: ["‘", "’"]
  secondary: ["“", "”"]

# But smart apostrophe is still the same character
apostrophe: "’"

dashes:
  # British often prefer en-dash with spaces (similar to Czech)
  - pattern: " --? "
    replacement: "[NBSP]– "
  # Ranges (en-dash, no spaces)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [a, an, the, in, on, at, by, of, for, with]

numbers:
  thousands_sep: ","
  decimal_sep: "."
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
