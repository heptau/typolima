language: Bahasa Indonesia
locale: id

quotes:
  primary: ["“", "”"]
  secondary: ["‘", "’"]

apostrophe: "’"

dashes:
  - pattern: " --? "
    replacement: "[NBSP]– "
  # Ranges
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [di, ke, se, dan]

numbers:
  thousands_sep: "."
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
