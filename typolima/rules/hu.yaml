language: Magyar
locale: hu

quotes:
  primary: ["„", "”"]
  secondary: ["»", "«"]

apostrophe: "’"

dashes:
  # En-dash with spaces for parenthetical thoughts
  - pattern: " --? "
    replacement: "[NBSP]– "
  # Ranges (en-dash, no spaces)
  - pattern: "(?<=\\d)-(?=\\d)"
    replacement: "–"
  - pattern: "\\.{3,}"
    replacement: "…"

non_breaking_prepositions: [a, e, s, v, b, f, n, u, i, m, z]

numbers:
  thousands_sep: "\u00A0"
  decimal_sep: ","
  unit_nnbsp: true

punctuation:
  space_before: []
  space_after:  []

custom_regex: []
